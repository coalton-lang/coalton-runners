name: 'Setup SBCL'
description: 'Build SBCL from source and install Quicklisp, matching the coalton-lang/base-images Docker setup'

inputs:
  sbcl-version:
    description: 'SBCL version to build from source (used when sbcl-git-repo is not set)'
    default: '2.6.3'
  sbcl-git-repo:
    description: 'Git repository URL for SBCL source (overrides SourceForge tarball when set)'
    default: ''
  sbcl-git-ref:
    description: 'Git branch, tag, or SHA to checkout (used with sbcl-git-repo)'
    default: ''
  make-extra-flags:
    description: 'Extra flags to pass to make.sh (e.g. --with-sb-linkable-runtime)'
    default: ''

runs:
  using: 'composite'
  steps:
    # --- Install bootstrap SBCL and build dependencies ---

    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: sudo apt-get update && sudo apt-get install --no-install-recommends -y libgmp-dev libmpfr-dev

    - name: Install bootstrap SBCL (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: brew install sbcl

    - name: Install bootstrap SBCL (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        choco install sbcl -y

    # --- Build SBCL from source ---

    - name: Build SBCL with old glibc (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        mkdir -p /tmp/sbcl-install
        docker run --rm -v /tmp/sbcl-install:/out debian:bullseye sh -c '
          set -ex
          apt-get update
          apt-get install --no-install-recommends -y sbcl build-essential zlib1g-dev libzstd-dev libgmp-dev libmpfr-dev curl bzip2 ca-certificates
          curl -L -o /tmp/sbcl-src.tar.bz2 \
            "https://sourceforge.net/projects/sbcl/files/sbcl/${{ inputs.sbcl-version }}/sbcl-${{ inputs.sbcl-version }}-source.tar.bz2"
          tar xf /tmp/sbcl-src.tar.bz2 -C /tmp
          cd /tmp/sbcl-${{ inputs.sbcl-version }}
          sh make.sh --prefix=/usr/local
          INSTALL_ROOT=/out sh install.sh
        '
        sudo cp -a /tmp/sbcl-install/* /usr/local/

    - name: Build SBCL from source (macOS)
      if: runner.os == 'macOS'
      shell: bash
      env:
        SBCL_GIT_REPO: ${{ inputs.sbcl-git-repo }}
        SBCL_GIT_REF: ${{ inputs.sbcl-git-ref }}
        SBCL_EXTRA_FLAGS: ${{ inputs.make-extra-flags }}
      run: |
        if [ -n "$SBCL_GIT_REPO" ]; then
          git clone ${SBCL_GIT_REF:+-b "$SBCL_GIT_REF"} "$SBCL_GIT_REPO" /tmp/sbcl-src
          # Fetch upstream release tags so git-describe reports the
          # correct version (forks may lack sbcl/sbcl's tags).
          git -C /tmp/sbcl-src fetch --tags https://github.com/sbcl/sbcl.git 2>/dev/null || true
          SBCL_DIR=/tmp/sbcl-src
        else
          curl -L -o /tmp/sbcl-src.tar.bz2 \
            "https://sourceforge.net/projects/sbcl/files/sbcl/${{ inputs.sbcl-version }}/sbcl-${{ inputs.sbcl-version }}-source.tar.bz2"
          tar xf /tmp/sbcl-src.tar.bz2 -C /tmp
          SBCL_DIR="/tmp/sbcl-${{ inputs.sbcl-version }}"
        fi
        cd "$SBCL_DIR"
        sh make.sh --prefix=/usr/local $SBCL_EXTRA_FLAGS
        sudo sh install.sh
        echo "SBCL_SRC_DIR=$SBCL_DIR" >> "$GITHUB_ENV"

    - name: Build SBCL from source (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      env:
        SBCL_GIT_REPO: ${{ inputs.sbcl-git-repo }}
        SBCL_GIT_REF: ${{ inputs.sbcl-git-ref }}
        SBCL_EXTRA_FLAGS: ${{ inputs.make-extra-flags }}
      run: |
        if ($env:SBCL_GIT_REPO) {
          $refArgs = if ($env:SBCL_GIT_REF) { @("-b", $env:SBCL_GIT_REF) } else { @() }
          git clone @refArgs $env:SBCL_GIT_REPO "$env:TEMP\sbcl-src"
          # Fetch upstream release tags so git-describe reports the
          # correct version (forks may lack sbcl/sbcl's tags).
          git -C "$env:TEMP\sbcl-src" fetch --tags https://github.com/sbcl/sbcl.git 2>$null
          $sbclDir = "$env:TEMP\sbcl-src"
        } else {
          curl.exe -L -o "$env:TEMP\sbcl-src.tar.bz2" `
            "https://sourceforge.net/projects/sbcl/files/sbcl/${{ inputs.sbcl-version }}/sbcl-${{ inputs.sbcl-version }}-source.tar.bz2"
          7z x "$env:TEMP\sbcl-src.tar.bz2" -o"$env:TEMP" -y
          7z x "$env:TEMP\sbcl-src.tar" -o"$env:TEMP" -y
          $sbclDir = "$env:TEMP\sbcl-${{ inputs.sbcl-version }}"
        }
        cd $sbclDir
        $makeArgs = @("make.sh", "--prefix=C:\sbcl")
        if ($env:SBCL_EXTRA_FLAGS) { $makeArgs += $env:SBCL_EXTRA_FLAGS }
        sh @makeArgs
        sh install.sh
        echo "C:\sbcl\bin" >> $env:GITHUB_PATH
        echo "SBCL_SRC_DIR=$sbclDir" >> $env:GITHUB_ENV

    # --- Remove bootstrap SBCL ---

    - name: Remove bootstrap SBCL (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: brew uninstall sbcl

    - name: Remove bootstrap SBCL (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: choco uninstall sbcl -y

    # --- Install Quicklisp ---

    - name: Install Quicklisp (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        curl -o /tmp/quicklisp.lisp https://beta.quicklisp.org/quicklisp.lisp
        sbcl --noinform --non-interactive \
          --load /tmp/quicklisp.lisp \
          --eval '(quicklisp-quickstart:install)' \
          --eval '(quit)'

    - name: Install Quicklisp (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        curl.exe -L -o "$env:TEMP\quicklisp.lisp" https://beta.quicklisp.org/quicklisp.lisp
        sbcl --noinform --non-interactive `
          --load "$env:TEMP\quicklisp.lisp" `
          --eval '(quicklisp-quickstart:install)' `
          --eval '(quit)'

    # --- Workaround libraries (matching base-images Docker setup) ---

    - name: Clone compatibility libraries
      shell: bash
      run: |
        EXTRAS_DIR="$HOME/quicklisp-extras"
        mkdir -p "$EXTRAS_DIR"
        git clone -c core.autocrlf=false https://github.com/melisgl/named-readtables.git "$EXTRAS_DIR/named-readtables"
        git clone -c core.autocrlf=false https://github.com/slburson/misc-extensions.git "$EXTRAS_DIR/misc-extensions"
        git clone -c core.autocrlf=false https://github.com/slburson/fset.git "$EXTRAS_DIR/fset"

    # --- Configure sbclrc ---

    - name: Write sbclrc
      shell: bash
      run: |
        cat > "$HOME/.sbclrc" << 'EOF'
        #-quicklisp
        (let ((quicklisp-init (merge-pathnames "quicklisp/setup.lisp" (user-homedir-pathname))))
          (when (probe-file quicklisp-init)
            (load quicklisp-init)))

        (setf ql:*local-project-directories*
          (list (merge-pathnames "quicklisp-extras/" (user-homedir-pathname))))
        EOF
